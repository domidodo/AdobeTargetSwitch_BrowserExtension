<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser-Erweiterung</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="popup-container">
        <div class="logo-container">
            <img src="AdobeTargetSwitch.png" alt="" class="logo">
        </div>
        <div class="elements-count">
            Targets: <span id="elements-count">0</span>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="checkDisable">
            <label for="checkDisable">Disable Adobe Target</label>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
